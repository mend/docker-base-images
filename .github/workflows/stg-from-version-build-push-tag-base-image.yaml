name: Staging Build and Push From Repo Integration Version

on:
  workflow_dispatch:
    inputs:
      Tag:
        description: "Tag: Repo Integration Version to pull, build, and push to ECR and S3."
        default: "1.1.1"
        type: string
        required: true
      IsLatest:
        description: "IsLatest: (default true) If True, release branch will be merged back into develop and release will be set as latest."
        default: true
        type: boolean
      SkipGit:
        description: "SkipGit: (default false) If True, no changes will be made to repo. However, the new images will still be pushed to ECR!"
        default: false
        type: boolean
      CopyVersionScript:
        description: "CopyVersionScript: (default true) If True generate_versions.sh will be copied from the release and added to the docker image"
        default: true
        type: boolean
      VersionSuffix:
        description: "Optional suffix appended to the version tag (e.g. 'c1' produces image tag '26.3.1-c1'). ZIP is still downloaded using the base Tag."
        default: ""
        type: string
        required: false
      TriggeredBy:
        description: "TriggeredBy: (default manual) Indicates what triggered this workflow. Set to 'ubuntu-refresh' to suppress Slack notifications."
        default: "manual"
        type: string
permissions:
  contents: write
  id-token: write

jobs:
  Staging_Build_And_Push_Base_Image_From_Version:
    runs-on: [mend-self-hosted, profile=developer-platform-xlarge-od]

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          ref: "main"
          fetch-depth: 0

      - name: Compute full version tag
        run: |
          SUFFIX="${{ github.event.inputs.VersionSuffix }}"
          if [ -n "$SUFFIX" ]; then
            FULL_TAG="${{ github.event.inputs.Tag }}-$SUFFIX"
          else
            FULL_TAG="${{ github.event.inputs.Tag }}"
          fi
          echo "FULL_TAG=$FULL_TAG" >> $GITHUB_ENV
          echo "Full version tag: $FULL_TAG"
        shell: bash

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::472613559203:role/github-actions-repo-integration-docker-base-images-role"
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registries: "054331651301"
          region: "us-east-1"
          mask-password: true

      - name: Download GHE ZIP from S3
        run: |
          echo "🔽 Starting download process..."
          ./bin/download.sh "${{ github.event.inputs.Tag }}"
          echo "✅ Download completed successfully"
        shell: bash

      - name: Extract and Generate Base Image Dockerfiles
        run: |
          echo "🔧 Starting Dockerfile generation process..."
          ./bin/copy.sh "${{ github.event.inputs.Tag }}" "${{ github.event.inputs.CopyVersionScript }}"
          echo "✅ Dockerfile generation completed successfully"
        shell: bash

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "🔨 Starting Docker build process..."
          ./bin/build.sh "${{ env.FULL_TAG }}" "$ECR_REGISTRY" "${{ github.event.inputs.CopyVersionScript }}"
          echo "✅ Docker build completed successfully"
        shell: bash

      - name: Publish to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "📤 Starting ECR publish process..."
          ./bin/publish.sh "${{ env.FULL_TAG }}" "$ECR_REGISTRY"
          echo "✅ ECR publish completed successfully"
        shell: bash

      - name: Branch, Commit, Push and Tag Changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If SkipGet is true, don't modify repo
          if [ "${{ github.event.inputs.SkipGit }}" = true ]; then
            echo "SkipGit is true, skipping git changes"
            exit 0
          fi

          # Note: using Github
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create Release branch
          git checkout -b release/${{ env.FULL_TAG }}
          git push --set-upstream origin release/${{ env.FULL_TAG }}

          # If files changed, add, commit and push
          if [[ `git status --porcelain` ]]; then
            echo "OK: Changes detected, committing and pushing."
            git add .
            git commit -m "Saving new files for ${{ env.FULL_TAG }}"
            git push
          else
            echo "WARNING: No changes were detected. This is fine though, skipping commit"
          fi

          # Create tag
          git tag -a ${{ env.FULL_TAG }} -m "Automated Tag for Release ${{ env.FULL_TAG }}"
          git push origin --tags

          # Create release
          if [ "${{ github.event.inputs.IsLatest }}" = false ]; then
            gh release create "${{ env.FULL_TAG }}" --latest=false --generate-notes --target release/${{ env.FULL_TAG }} --title "${{ env.FULL_TAG }}"
            echo "IsLatest is false, not merging release branch back into develop"
            exit 0
          else
            gh release create "${{ env.FULL_TAG }}" --latest --generate-notes --target release/${{ env.FULL_TAG }} --title "${{ env.FULL_TAG }}"
          fi

          # Merge release branch back into develop
          git checkout develop
          git merge release/${{ env.FULL_TAG }} --commit --no-edit
          git push
        shell: bash

      - name: Notify Slack - Images Ready
        if: always() && github.event.inputs.TriggeredBy != 'ubuntu-refresh'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SLACK_WEBHOOK_URL: ${{ secrets.STG_SLACK_WEBHOOK_URL }}
        run: |
          echo "📤 Sending Slack notification..."
          ./bin/notify-slack.sh "${{ env.FULL_TAG }}" "${{ job.status }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
